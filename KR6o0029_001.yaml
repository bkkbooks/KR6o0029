body:
  text: 古吳蕅益釋智旭述解分為二初解題二解文解題為三初正解論題二出論主三出譯師今初因明入正理論因明二字是能入正理二字是所入因者諸法所以然之故乃三支比量中之一支三支謂宗因喻也宗非因不顯喻非因不立因最有力故標因明因既明則能立能破能破則邪無不摧能立則正無不顯摧邪則遍計之我法俱破顯正則依圓之真俗並立真俗二種正理由因明而得入故名因明入正理也論者辨明判決之謂而有二種若疏決經文名為釋論若依經立義名為宗論今是宗論也二出論主商羯羅主菩薩造商羯羅主未見的翻或云即天主也菩薩如常釋三出譯師唐三藏法師玄奘譯法師行迹載慈恩傳翻梵成華名之曰譯二解文為三初以頌攝要二別釋八門三以頌總結初中二初頌八門二益二明攝諸要義今初能立與能破及似惟悟他現量與比量及似惟自悟一真能立二真能破三似能立四似能破此四門令他得悟總名他益五真現量六真比量七似現量八似比量此四門令自得悟總名自益故曰八門二益也此是一論綱宗下文自釋不必繁解若欲預知略陳梗槩真能立謂三支無過可以顯正開悟他人真能破謂出他過失可以摧邪開曉問者似能立謂雖欲申量三支帶過不足曉他似能破謂雖欲斥他妄出彼過彼實無過真現量謂無分別智了法自相真比量謂藉相觀義有正智生似現量謂有分別智於義異轉似比量謂虗妄分別不能正解問曰真立真破可以悟他似立似破云何悟他真現真比可以自悟似現似比云何自悟答曰四真是藥四似是病若不知病便不識藥是故八門一一須辨是則能立能破真現真比皆號因明自悟悟他皆名為入四似及所破是邪所立所觀所顯即正理也二明攝諸要義如是總攝諸論要義謂此八門二益不惟攝此一論即已總攝諸論要義蓋論義雖多建章總不出破立二門會理總不出權實二智利益總不出自他二悟故也二別釋八門為七初真能立門二似能立門三真現量真比量二門四似現量門五似比量門六真能破門七似能破門問曰此釋八門何故與頌中次第不同答曰頌約二益以列八門是取文便此釋八門意在隨文入觀以成自利利他二益何者由真能立以生正解由似能立以防謬解解成入證得真現量及真比量即是根本後得二智也由證二智方知似現似比之僞是故真得二智方能破立令他得悟若似現似比有所言說但成似破似立而已可不慎哉初真能立門三初標二釋三結今初此中宗等多言名為能立由宗因喻多言開示諸有問者未了義故謂此門中宗因喻多種語言名為能立何以故由此宗因喻多種語言則能開示諸有問者所未了之義故二釋又三初釋宗二釋因三釋喻今初此中宗者謂極成有法極成能別差別性故隨自樂為所成立性是名為宗如有成立聲是無常謂此真能立門三支之中所言宗者即是前陳極成有法以為宗依後陳極成能別以為宗體及自意許差別性故故名為宗以要言之但隨其自意樂為所成立性即名為宗譬如有人成立聲是無常舉一例諸凡所成立若不違理即是真能立宗也聲之一字即前陳有法無常二字即後陳宗體或指明論聲無常或指餘聲論無常或總指一切聲皆無常口雖不言心有所指即意許差別性也言極成者謂道理決定成就無有互不相許之過言有法者不同龜毛兔角但是名字言能別者正是宗體為顯前陳有法宗依是所別故斷常二見俱是外道所計今云無常以破常見其實非常亦復非斷即小乘之正印大乘之初門故舉此一宗略顯能立然三界依正總皆無常今獨舉聲者以聲塵初生即滅不容稍停尤易顯於無常義故若知聲是無常便可例知一切無常既皆無常亦決無我豈非顯二空之要訣耶又明論及聲顯論皆計聲常故對彼立聲是無常二釋因三初總標三相二別釋二品三結成因性今初因有三相何等為三謂遍是宗法性同品定有性異品遍無性因者所由也所以也譬如凡所作性定屬無常故用所作性三字為所由所以之因成立無常之宗而為其果也只此一因對於宗喻便有三相一者須要遍是宗及有法之性如所作性三字望于聲之有法無常之宗決定皆有所作性義故名遍是宗法性舉一例諸凡所出因不得與宗法相違也二者於同品喻中須是定有之性如瓶等無常名同品喻定有所作性義也三者於異品喻中須是遍無之性如虗空等非是無常名異品喻周遍推求決無所作性義也二別釋二品云何名為同品異品謂所立法均等義品說名同品如立無常瓶等無常是名同品異品者謂於是處無其所立若有是常見非所作如虗空等言同品者謂與所立宗法均平齊等之義品也如立無常為宗而瓶等無常是名同喻言異品者謂於是異喻處無自所立無常之宗是名異喻所謂若有是常見非所作如虗空等若有是常句遣無常宗見非所作句遣所作因如虗空等句番瓶等喻故上文云異品遍無性也龍樹云若所立無說名異品非但與同品相違或異而已三結成因性此中所作性或勤勇無間所發性遍是宗法於同品定有性異品遍無性是無常等因謂假如此立聲是無常宗中或云所作性故以為其因或云勤勇無間所發性故以為其因則遍是宗及有法之性亦是同品定有性亦是異品遍無性是故得為無常宗及同喻異喻家之因也文中舉二因者所作性因以對明論勤勇無間所發性因對聲顯論三釋喻喻有二種一者同法二者異法同法者若於是處顯因同品決定有性謂若所作見彼無常譬如瓶等異法者若於是處說所立無因遍非有謂若是常見非所作如虗空等此中常言表非無常非所作言表無所作如有非有說名非有先雙標次各釋先釋同法者若於是喻處顯示因之同品決定有性謂若所作之因見彼無常之宗則以譬如瓶等而為同喻瓶亦所作瓶亦無常故名為同法也次釋異法又二先正釋次揀非先正釋異法者若於是喻處說所立宗法決定是無所出因性亦遍非有乃名異法謂若是常則無所立無常宗法見非所作則遍非有所作性因如虗空等則無瓶等可為同喻故名為異法也次復揀非謂此中所言常者但為表示非無常耳不是立常為宗以與無常相對也此中所言非所作者但為表示無所作耳不是立非所作為因以與所作相對也譬如有決非有所以說名非有耳豈可謂更有一箇非有以與有相對哉此正顯示但借虗空常非所作為異喻以表無常正宗決不立虗空為常宗也若計虗空定有定常即是外道故已上真能立門初標二釋竟三結已說宗因等如是多言開悟他時說名能立如說聲無常者是立宗言所作性故者是宗法言若是所作見彼無常如瓶等者是隨同品言若是其常見非所作如虗空者是遠離言惟此三分說名能立前已廣釋三支今更結撮總示謂上文已說宗因喻之多種語言以此開悟他時說名能立且如若說聲無常者即是立宗之言若說所作性故因者即遍是宗法性之言若合云凡是所作見彼無常如瓶等者即是隨同品之言若云設是其常見非所作如虗空者即是遠離無常宗及所作因之言惟此宗因喻三分說名能立也是中異品但名是遠離言者正顯秪是遮遣同法耳非許更立常宗及非所作因也問曰隨同品言中何故先云若是所作次云見彼無常遠離言中何故先云若是其常次云見非所作答曰但可云一切所作性皆是無常不可云一切無常皆是所作性此合之所以必先因而後宗也但可云若是常者定非所作不可云非所作者定是常此離之所以必先宗而後因也初真能立門竟二似能立門二初正釋二結過初中三初釋似宗二釋似因三釋似喻初又三初標列九過二別釋九過三總結九過今初雖樂成立由與現量等相違故名似立宗非真能立謂現量相違比量相違自教相違世間相違自語相違能別不極成所別不極成俱不極成相符極成下文自釋不必更解但出大意現量謂無分別智所知比量謂正分別智所知自教謂不論大乘小乘內宗外宗各有自己所稟之教世間謂世人依于世諦共所許事自語謂自所立法已上五種隨一相違便非真能立宗者也能別謂後陳宗體所別謂前陳有法俱謂宗及有法已上二種隨一不成便不可立況俱不成豈能立哉相符謂與敵家更無二趣既已相符何勞別立所以亦名似宗非真能立也二別釋九過此中現量相違者如說聲非所聞耳識聞聲是現量境以聲是耳識相分耳識正聞聲時不帶名言無分別故若於聲是有法而立非所聞宗則違現量道理矣比量相違者如說瓶等是常瓶雖現有決歸無常此乃正分別智之所比知若於瓶等有法而立常宗則違比量所知道理矣自教相違者如勝論師立聲為常勝論師立六句義一實二德三業四大有五同異六和合就第二德句中有二十四種今聲乃二十四中之一也即彼自教亦謂聲屬德句所攝惟所作性體非常住假如彼復立聲為常則與自教相違矣世間相違者如說懷兔非月有故又如說言人頂骨淨衆生分故猶如螺貝兔因望月而懷妊人之頂骨是不淨此皆世人所知今若說母兔之懷小兔非因望月而有又或說人之頂骨是淨以是衆生身分故喻如螺貝則與世間相違矣當知衆生分故之因猶如螺貝之喻皆可成立不淨之宗不可成立淨宗也自語相違者如言我母是其石女生我身者乃名我母石女不能生兒設言母是石女則與自語相違矣能別不極成者如佛弟子對數論師立聲滅壞能別指後陳宗體如此中滅壞二字是也聲本剎那滅壞但數論師決不許聲滅壞故對彼立滅壞宗名不極成以彼決不肯信受故也若欲破數論師計聲是實者應云聲是有法決定無實宗因云三事合成故同喻如軍林等破計常亦爾具如唯識初卷中說三事即數論所計薩埵剌闍答摩以為能成二十三法以為所成而聲即彼所計二十三法之一也所別不極成者如數論師對佛弟子說我是思所別指前陳有法如此中我字是也佛弟子決不許立我以為有法故對此說我是思名不極成以佛弟子決知無我故也俱不極成者如勝論師對佛弟子立我以為和合因緣勝論計我為實句義攝由德句中覺樂苦欲瞋勤勇行法非法之九種和合因緣能起智相名我由我與和合句作因緣和合句令九德與我和合起於智相故舉和合及所起智以顯我體然佛弟子不許實我則彼立我以為所別便不極成佛弟子不許和合句為實有則彼立和合因緣以為能別亦不極成故云俱不極成也此和合因緣是勝論外道妄計心外實法乃邪因緣非正教中十二因緣相符極成者如說聲是所聞聲是所聞人皆知之彼此既已相符何勞立量對辨故論本云若如其聲兩義同許俱不須說蓋義有違反方須立量今既相符不須更說不應說而說即是多事故成過也二別釋九過竟三總結九過如是多言是遣諸法自相門故不容成故立無果故名似立宗過多言指上九種似宗之語言也遣違也前五相違過是遣諸法自相門故後三不極成及相符極成過是不容成故立此九種似宗總不生智果故所以不名真能立也遣諸法自相門者如說聲非所聞即此非所聞言便與聲之自相相違如言瓶常即此常言便與瓶之自相相違如立聲為常亦與聲之自相相違如說懷兔非月有亦與兔之自相相違如說人頂骨淨即此淨言便與頂骨自相相違如說母是石女即此石女之言便與我母自相相違也不容成者三種不極成則敵家不許故不容成相符極成則無可諍辨故不須妄立亦不容成也立無果者由真能立令人生於正智名為有果今似能立則正智不生故無果也二明似因二初總標二別釋今初已說似宗當說似因不成不定及與相違是名似因四種不成六種不定四種相違皆名似因非真能立之因也二別釋三初釋不成二釋不定三釋相違初中二初列名二釋相今初不成有四一兩俱不成二隨一不成三猶豫不成四所依不成二釋相如成立聲為無常等若言是眼所見性故兩俱不成所作性故對聲顯論隨一不成此先釋四不成中之前二種也設立量云聲是有法無常為宗因云是眼所見性故則賓主兩皆不許故名兩俱不成也設立量云聲是有法無常為宗因云所作性故以對明論則可成矣倘以對聲顯論則賓家不許故名隨一不成也言明論者有人偏執五明論中之聲論是常謂其能為決定不易之量以表詮諸法故唯識論中則以許能詮故破之謂餘聲亦能詮表既非常住聲論能詮與餘聲同何獨常住今以所作性故破之亦得蓋聲論既是所作決定無常故也言聲顯論者有執一切聲性皆是常住不從緣生但待外緣顯發方有詮表故名為聲顯論唯識論中則以待衆緣故破之謂既待衆緣喻如瓶衣定非常住今若對彼立所作性故之因彼將反破斥曰聲是所顯豈是所作則賓家不許犯隨一不成矣故若對聲顯論須云勤勇無間所發性故即與唯識論中待衆緣故義同然設以勤勇無間所發性故而對明論則明論不許亦犯隨一不成所以上文真能立中連舉二因其意在此不可不知於霧等性起疑惑時為成大種和合火有而有所說猶豫不成此釋第三不成也見理未確妄有所說名為猶豫譬如遠見霧起其實非煙疑惑是煙遂為成立大種和合火有之宗而有所說云遠處火起是有法火與大種和合為宗因云以見煙故是則猶豫不確之因何能成立於宗法也大種即指薪炭等有質礙物虗空實有德所依故對無空論所依不成此釋第四不成也空非心外實法原不可計定有定無然有外道計空定有復有外道計空定無今以計定有之因對彼計定無之論故名所依不成也計定有者曰虗空是有法定有為宗因云德所依故謂萬物皆依空生皆依空住也計定無者破曰以無物故名為虗空虗空非有云何可依則彼德所依故之因不成矣初釋不成有四竟二釋不定二初列名二釋相今初不定有六一共二不共三同品一分轉異品遍轉四異品一分轉同品遍轉五俱品一分轉六相違決定二釋相此中共者如言聲常所量性故常無常品皆共此因是故不定為如瓶等所量性故聲是無常為如空等所量性故聲是其常謂假如立量云聲是有法定常為宗因云所量性故則常無常品皆共此因是故名為不定過也今當反問之曰為如瓶等所量性故聲亦同瓶之無常耶為如空等所量性故聲亦同空是其常耶言不共者如說聲常所聞性故常無常品皆離此因常無常外餘非有故是猶豫因此所聞性其猶何等謂假如立量云聲是有法定常為宗因云所聞性故則常無常品皆離此因是故亦名不定過也若喻如空空何所聞而顯常若喻如瓶瓶何所聞而顯無常若除空與瓶之常無常外餘同品喻更非有故是則便成猶豫之因此所聞性既非猶空之常又非猶瓶之無常畢竟其猶何等耶同品一分轉異品遍轉者如說聲非勤勇無間所發無常性故此中非勤勇無間所發宗以電空等為其同品此無常性於電等有於空等無非勤勇無間所發宗以瓶等為異品於彼遍有此因以電以瓶為同法故亦是不定為如瓶等無常性故彼是勤勇無間所發為如電等無常性故彼非勤勇無間所發謂假如立量云聲是有法非勤勇無間所發為宗因云無常性故此無常性之因於同品止一分轉於異品却遍轉是故亦名不定過也蓋此中既以非勤勇無間所發為宗則當以電空等喻為其同品然此無常性之因於電等則有而於空等則無是同品止一分轉矣又此非勤勇無間所發宗當以瓶等喻為其異品然此無常性之因於彼瓶等却是遍有是異品却遍轉矣上正破竟此因下破轉計謂設使此無常性之因以電以瓶為同法故亦是不定今試問曰為如瓶等無常性故成彼聲是勤勇無間所發耶為如電等無常性故成彼聲非勤勇無間所發耶則于同品仍止一分轉而為不定過矣異品一分轉同品遍轉者如立宗言聲是勤勇無間所發無常性故勤勇無間所發宗以瓶等為同品其無常性於此遍有以電空等為異品於彼一分電等是有空等是無是故如前亦為不定謂假如立量云聲是有法是勤勇無間所發為宗因云無常性故此無常性之因於同品上雖能遍轉於異品上仍一分轉不能不轉是故亦名不定過也蓋勤勇無間所發宗必以瓶等為同品今其無常性之因於此瓶等遍有是謂同品遍轉固無過矣但勤勇無間所發宗必以電空等為異品今此無常性之因於彼一分電等仍復是有唯於一分空等方得是無豈非異品僅能一分不轉尚有一分轉乎言是故如前亦為不定者謂設使轉計此無常性以電以瓶而為同品則當難曰為如電等無常性故成彼聲非勤勇無間所發耶為如瓶等無常性故成彼聲是勤勇無間所發耶則仍于同品亦止一分轉而為不定過矣俱品一分轉者如說聲常無質礙故此中常宗以虗空極微為同品無質礙性於虗空等有於極微等無以瓶樂等為異品於樂等有於瓶等無是故此因以樂以空為同法故亦名不定樂音洛俱品一分轉謂於同品異品各一分轉一分不轉也上明真能立因須是同品定有異品遍無定有即遍轉義遍無即不轉義今同品僅一分轉則非定有異品亦一分轉則非遍無也謂假如立量云聲是有法定常為宗因云無質礙故此無質礙之因於同品喻僅一分轉不能遍轉於異品喻仍一分轉不能遍無是故亦名不定過也蓋此中常宗必將以虗空極微等為同品喻今此無質礙性之因於虗空等則有於極微等則無是同品僅一分轉矣又此常宗必將以瓶樂等為異品喻今此無質礙性之因於樂等仍有於瓶等乃無是異品仍一分轉矣上正破竟是故下破轉計謂此無質礙性之因設使以樂以空為同法故亦名不定今試問曰為如空無質礙證聲是常耶為如樂無質礙却證聲是無常耶則於同品亦仍止一分轉而為不定過矣相違決定者如立宗言聲是無常所作性故譬如瓶等有立聲常所聞性故譬如聲性此二皆是猶豫因故俱名不定無常之宗雖以所作性為因然不可說聲非所聞性則不能破妄計常者而立無常計常之宗雖以所聞性為因然不可說聲非所作則不能破無常正說而立常宗故雖決定相違而皆猶豫不定也問曰如何方可破彼計常而立無常答曰應翻彼量云聲性是有法決定無常宗因云許所聞故同喻如聲塵或云所聞聲是有法決定無常宗因云許是所聞故同喻如所見色二釋不定有六境三釋相違二初列名二釋相今初相違有四謂法自相相違因法差別相違因有法自相相違因有法差別相違因等法自相即宗體之言陳法差別即宗體之意許有法自相即宗依之言陳有法差別即宗依之意許也二釋相此中法自相相違因者如說聲常所作性故或勸勇無間所發性故此因唯於異品中有是故相違聲是有法定常為宗常即法之自相也若以所作性為因或以勤勇無間所發性為因此二因者惟於異品無常宗中則有是故與常宗自相相違法差別相違因者如說眼等必為他用積聚性故如臥具等此因如能成立眼等必為他用如是亦能成立所立法差別相違積聚他用諸臥具等為積聚他所受用故外道以計我為宗而我有二義一者神我不生不滅即是真常之體二者我身積聚四大所成有生有滅即是神我之所受用彼謂譬如積聚臥具等物必為身用則積聚四大以為眼等之身亦必為神我所用若無神我何須四大積聚之身譬如若無四大積聚之身何須臥具等物故立量云眼等是有法必為他神我所用宗因云眼等是積聚性故同喻如積聚臥具必為身之所用也此中他之一字即彼所計宗體名之為法然約眼等則以神我為他若約臥具則又以眼等之積聚身為他是一他字法上而有二種差別之不同矣今故破曰此積聚性之因假如能成立眼等必為神我之他所用如是亦能成立彼自所立法中差別相違之義而為積聚之他所用何以故現見諸臥具等但為積聚他之所受用故既積聚臥具但為積聚他用則積聚身又豈必為神我用哉蓋設使果有神我而神我既不須臥具又何須身又積聚臥具既但為積聚身用則積聚身亦但當為積聚他用若神我亦是積聚故名為他則是無常亦非真我若神我非是積聚則不當用積聚眼等以積聚身乃須受用積聚物故是中所立法三字即指外道所立必為他用宗體彼欲以積聚性之因成立神我之他而為能用今即以彼積聚性之因却成立積聚之他而為能用則神我不攻自破故名法差別相違也有法自相相違因者如說有性非實非德非業有一實故有德業故如同異性此因如能成遮實等如是亦能成遮有性俱決定故勝論立六句義一實句謂地等九種二德句謂色等二十四種三業句謂取等五種四大有句謂離實德業外別有一法為體由此大有乃有實德業故蓋計大有是能有實德業是所有也五同異句謂由此句故令諸法各有同異如地望地有其同義地望水等有其異義地之同異是地非水水等亦然妄計此同異句亦別有自性也六和合句謂法和聚由和合句如鳥飛空忽至樹枝住而不去由和合句故令有住業也今先就彼妄計立量然後出過先立量云假如說大有性是有法非實非德非業宗因云有一實故有德業故喻如同異性次出過云此有一實故有德業故之因假如能成立彼遮于實等而云非實非德非業是大有性如是亦能立遮大有性而云非實非德非業即亦非大有性何以故有實德業者既決定非實德業則實德業有者亦決定非大有性俱決定故應申量云彼所執大有性是有法既非實非德非業應亦非大有性宗因云有一實故有德業故喻如實德業有法差別相違因者如即此因即於前宗有法差別作有緣性亦能成立與此相違作非有緣性如遮實等俱決定故此因即指有一實故有德業故之因也前宗有法差別指前文言陳雖但明大有句是有意許則計實句德句業句皆有也緣性即因也謂假如即此有一實故有德業故之因即於前非實非德非業之宗其有法差別上并可作有實句有德句有業句之因然亦便能成立異此相違而作非有實句非有德句非有業句之因何以故如以此有一實故有德業故之因而遮大有句非德非實非業於大有句外決定別有實德業句亦即以此有一實故有德業故之因而成大有句外決定非有實句德句業句俱決定故是中外量云實德業是有法離大有性外決定別有宗因云有一實故有德業故喻如同異性申違量云彼所執實德業是有法離大有性外決定非有宗因云有一實故有德業故喻如大有性三釋相違有四竟已上明似因竟三明似喻二初總標二別釋今初已說似因當說似喻似同法喻有其五種一能立法不成二所立法不成三俱不成四無合五倒合似異法喻亦有五種一所立不遣二能立不遣三俱不遣四不離五倒離二別釋能立法不成者如說聲常無質礙故諸無質礙見彼是常猶如極微然彼極微所成立法常性是有能成立法無質礙無以諸極微質礙性故能立即因也所立即宗也假如說言聲是有法定常為宗因云無質礙故合云諸無質礙見彼是常猶如極微然彼極微之喻於宗法常性縱許是有而於因法之無質礙則便是無何以故以諸極微亦是質礙性故是則喻與因違故名能立法不成也所立法不成者謂說如覺然一切覺能成立法無質礙有所成立法常住性無以一切覺皆無常故此亦以聲常為宗無質礙故為因而喻如覺然一切覺雖於因法之無質礙則有而於宗法之常住性則無何以故以一切覺皆無常故是則喻與宗違故名所立法不成也俱不成者復有二種有及非有若言如瓶有俱不成若說如空對非有論無俱不成俱不成謂於所成宗法及能成因皆有不成過也此復二種一者有喻而喻與宗因相違故俱不成二者非有喻喻既非有不足以成宗因故俱不成先釋有喻若言聲常無質礙故同喻如瓶瓶雖是有而性無常復有質礙故俱不成也次釋非有若說聲常無質礙故喻如虗空此對有空論說則可設對非有空論則空既無矣何得論常無常礙無礙哉故亦俱不成也無合者謂於是處無有配合但於瓶等雙現能立所立二法如言於瓶見所作性及無常性能立即因指見所作性也所立即宗指無常性也理應合云諸所作性皆是無常同喻如瓶方能顯義今既無合則義不顯故亦為過也倒合者謂應說言諸所作者皆是無常而倒說言諸無常者皆是所作亦有無常而非所作者故亦成過如是名似同法喻品此總結似同法喻有五種也似異法中所立不遣者且如有言諸無常者見彼質礙譬如極微由於極微所成立法常性不遣彼立極微是常性故能成立法無質礙無凡立異喻本為反顯同法故欲以無常反顯常宗質礙反顯無質礙因須立異喻乃可反顯同喻且如立聲常者或復有言諸無常者見彼質礙譬如極微則此異喻於其所立常宗不遣以彼外道本立極微是常而今反以極微為異喻是宗反成無常不足顯常宗矣故此異喻微塵唯於無質礙因則無而於常宗仍有是于因成異喻于宗不成異喻名為所立不遣也能立不遣者謂說如業但遣所立不遣能立彼說諸業無質礙故謂若立聲常者或說異喻如業此則但遣所立常宗不遣能立無質礙因以彼說諸業無質礙故是則於宗成異喻於因不成異喻名為能立不遣也俱不遣者對彼有論說如虗空由彼虗空不遣常住無質礙性以說虗空是常性故無質礙故謂若無虗空論立聲常者或說異喻如虗空以對有虗空論則彼虗空二字不能遣常住宗亦不能遣無質礙因一總不成異喻故名俱不遣也何以故以彼有虗空論說虗空是常性故無質礙故不離者謂說如瓶見無常性有質礙性謂彼立常宗者但云異喻如瓶見無常性有質礙性而不云諸無常者見彼質礙猶如瓶等則離遣之旨不顯故名不離倒離者謂如說言諸質礙者皆是無常若約無常宗同喻正應合云諸質礙者見彼無常喻如瓶等今約立常宗異喻故應離云諸無常者見彼質礙方不顛倒如或說言諸質礙者皆是無常則名倒離蓋合必先因而後宗離必先宗而後因語脉應爾決不可亂亂則非真能立也已上第二似能立門中初正釋竟二結過如是等似宗因喻言非正能立二似能立門竟三真現量真比量二門為三初總標二別釋三總結今初復次為自開悟當知惟有現比二量二別釋此中現量謂無分別若有正智於色等義離名種等所有分別現現別轉故名現量現者顯現分明也量者度量楷定也無分別者分別有三種一自性分別二隨念分別三計度分別今無隨念計度二種分別名之為現但有自性分別名之為量自性分別即無分別非謂如土木金石也圓覺經云譬如眼光曉了前境其光圓滿得無憎愛夫曉了前境即是自性分別即是正智得無憎愛即無隨念計度即無分別也統論現量所攝則根本智證真如理正名現量第八識之見分緣三種性境亦名現量前五識及同時意識緣現在境亦名現量定中獨頭意識緣禪定境亦名現量如此心王在現量時所有相應心所亦皆同名現量又一切心王心所之自證分緣於見分亦名現量證自證分與自證分更互相緣亦皆通名現量故此現量正智雖復昏迷倒惑毛道異生未嘗不具但日用不知耳今且就前五識及同時意識以辨其相故云若有正智於色聲香味觸法之義離於名言習氣種子所有虗妄隨念計度二種分別各於自相分境現現別轉故名現量言色等義者六塵本是六識自所變相非心外法無性無生不屬名言也言現現別轉者謂見分顯現了別相分顯現轉變但是依他起性不墮遍計執情故得名現量也唯識論問云色等外境分明見證現量所得寧撥為無答云現量證時不執為外後意分別妄生外想故古人曰見色聞聲止可一度又有頌曰綵雲端裏仙人現手把紅羅扇遮面急須著眼看仙人莫看仙人手中扇旨哉言乎言比量者謂藉衆相而觀於義相有三種如前已說由彼為因於所比義有正智生了知有火或無常等是名比量相有三種即因中三相離十四過也因見煙故了知有火以譬因見所作知法無常雖未現證而於所觀境義不謬故名比量題稱因明正由於此惟稟正教人第六識與正解等諸心所相應者有之三總結於二量中即智名果是證相故如有作用而顯現故亦名為量言此現比二量之中即現量無分別正智及比量所生有分別正智名之為果以現量是證相故以比量雖未現證如有作用而顯現故亦名為量四似現量門有分別智於義異轉名似現量謂諸有智了瓶衣等分別而生由彼於義不以自相為境界故名似現量世人現見瓶衣等種種假物妄謂亦是現量其實皆由分別而生以彼有分別智於色等義不得自相但是於義異轉與上所云現現別轉者不侔故名似現量也五似比量門若似因智為先所起諸似義智名似比量似因多種如先已說用彼為因於似所比諸有智生不能正解名似比量謂若以帶十四過之似因智而為先導所起虗妄分別諸似義智不能正解故名似比量也似因十四過中隨犯一過則所生智不解正義非正智矣六真能破門復次若顯示能立過失說名能破謂初能立缺減過性立宗過性不成因性不定因性相違因性及喻過性顯示此言開曉問者故名能破此明真能破者可以破彼似能立也若能顯示似能立者所有過失說名能破謂彼初似能立者有種種缺減過性或犯立宗九過性或犯四不成因性或犯六不定因性或犯四相違因性及犯同喻異喻十種過性今為顯示此言以開曉於問者故名能破七似能破門若不實顯能立過言名似能破謂於圓滿能立顯示缺減性言於無過宗有過宗言於成就因不成因言於決定因不定因言於不相違因相違因言於無過喻有過喻言如是言說名似能破以不能顯他宗過失彼無過故且止斯事此明似能破者不可以破真能立也若其語言不能實顯能立之過名似能破謂於圓滿真能立者而反妄言顯示其缺減性或於無過宗而反言其有過或於成就四因反言其不成或於決定因而反言其不定或於不相違因而反言其相違或於無過喻而反言其有過如是言說皆名為似能破以不能顯他宗過失彼既無過不應妄破故結誡云且止斯事也大文二別釋八門竟三以頌總結已宣少句義為始立方隅其間理非理妙辨於餘處初入佛法即須以此少少句義而辨邪正故為始立方隅譬如航海須指南車乃識方隅如是初游佛法海者須此因明可辨邪正也真能立真現量真比量名為理似能立似現量似比量名非理非理則可破理則不可破一切論藏不過辨此理與非理故云妙辨於餘處也然則不學因明無以入正理之門不窮教海無以盡因明之妙欲人守其約以博學會其博而歸約也
